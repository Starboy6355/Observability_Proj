# App name - appears in traces and logs
spring.application.name=order-tracker

# Port the app runs on
server.port=8080

# ─── Actuator ───────────────────────────────────────────────
# Expose all actuator endpoints (health, metrics, prometheus)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ─── Prometheus ─────────────────────────────────────────────
# Actuator exposes metrics at /actuator/prometheus
# Prometheus scrapes this URL every 15 seconds
management.prometheus.metrics.export.enabled=true

# ─── Tracing (OTel → Jaeger) ────────────────────────────────
# Send 100% of traces (in production you'd use 0.1 = 10%)
management.tracing.sampling.probability=1.0

# Where to send traces - points to OTel Collector in Docker network
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces

# ─── Logging ────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.ordertracker=DEBUG
