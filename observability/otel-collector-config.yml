# OTel Collector Configuration
# This is the ROUTER you identified earlier
# It receives traces from your app and forwards them to Jaeger

receivers:
  # Receive traces from your Spring Boot app
  # Your app sends traces to this collector on port 4318
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # Batch traces before sending - more efficient than sending one by one
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Forward traces to Jaeger
  # Jaeger stores them and shows them in its UI
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Also print traces to collector logs (useful for debugging)
  debug:
    verbosity: basic

service:
  pipelines:
    # The trace pipeline: receive → process → export
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
