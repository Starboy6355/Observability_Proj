version: '3.8'

# Docker Compose starts ALL these services with one command: docker compose up
# They all run in the same Docker network so they can talk to each other
# by service name (e.g. "loki", "prometheus", "jaeger")

services:

  # ─── Your Spring Boot App ───────────────────────────────────
  order-tracker-app:
    build: ./app                          # Build from the Dockerfile in ./app folder
    container_name: order-tracker-app
    ports:
      - "8080:8080"                       # Your laptop:VM port → container port
    environment:
      - SPRING_PROFILES_ACTIVE=default
    depends_on:
      - loki                              # Wait for Loki to start first
      - otel-collector                    # Wait for OTel Collector to start first
    networks:
      - observability-network

  # ─── Prometheus ─────────────────────────────────────────────
  # Pulls metrics from your app every 15 seconds
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      # Mount our prometheus.yml config into the container
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - observability-network

  # ─── Grafana ────────────────────────────────────────────────
  # The dashboard - connects to Prometheus, Loki, and Jaeger as data sources
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true    # No login needed for learning
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana     # Persist dashboards between restarts
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - observability-network

  # ─── Loki ───────────────────────────────────────────────────
  # Receives and stores logs from your app
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability-network

  # ─── Jaeger ─────────────────────────────────────────────────
  # Receives and stores traces - shows request journeys
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"                     # Jaeger UI
      - "4317:4317"                       # Receives traces via gRPC
      - "4318:4318"                       # Receives traces via HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - observability-network

  # ─── OTel Collector ─────────────────────────────────────────
  # The router - receives traces from app, forwards to Jaeger
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"                       # gRPC receiver
      - "4318:4318"                       # HTTP receiver
    depends_on:
      - jaeger
    networks:
      - observability-network

# All services share this network so they can reach each other by name
networks:
  observability-network:
    driver: bridge

# Persistent storage for Grafana dashboards
volumes:
  grafana-data:
